<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandria - Buscador Gnóstico</title>
    <style>
        :root {
            --oro: #d4af37;
            --purpura-oscuro: #1a0f2e;
            --purpura-claro: #3d2b56;
            --blanco-suave: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--purpura-oscuro);
            color: var(--blanco-suave);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Contenedor del fondo con imágenes de los Maestros */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            opacity: 0.3; /* Ajustar para que el texto sea legible */
            filter: sepia(0.5) grayscale(0.2);
        }

        .master-photo {
            width: 300px;
            height: 400px;
            border: 1px solid var(--oro);
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        /* Espacio para las fotos (reemplazar URLs en las variables o el style) */
        .photo-samael { background-image: url('tu-link-a-foto-samael.jpg'); }
        .photo-lakshmi { background-image: url('tu-link-a-foto-lakshmi.jpg'); }

        .main-container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            background: rgba(26, 15, 46, 0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: var(--oro);
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 2px 2px 10px rgba(212, 175, 55, 0.5);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-style: italic;
        }

        .status-tag {
            display: inline-block;
            font-size: 0.8rem;
            color: var(--oro);
            border: 1px solid var(--oro);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .btn-enter {
            background-color: transparent;
            color: var(--oro);
            border: 2px solid var(--oro);
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .btn-enter:hover {
            background-color: var(--oro);
            color: var(--purpura-oscuro);
            box-shadow: 0 0 20px var(--oro);
        }

        /* Animación sutil de entrada */
        .fade-in {
            animation: fadeIn 2s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background-overlay">
        <div class="master-photo photo-samael"></div>
        <div class="master-photo photo-lakshmi"></div>
    </div>

    <div class="main-container fade-in">
        <h1>¡Bienvenido a Alexandria!</h1>
        <p>
            El buscador gnóstico por excelencia, incluyendo la bibliografía del <br>
            <strong>V.M. Samael Aun Weor</strong> y del <strong>V.M. Lakshmi Daimon</strong>.
        </p>
        
        <div class="status-tag">Aún en construcción</div>
        <br>
        
        <button class="btn-enter" onclick="abrirHerramienta()">Entrar a la Herramienta</button>
    </div>
    <script src="loader.js"></script>

</body>
</html>
