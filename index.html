<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexandria - Buscador Gnóstico</title>
  <link rel="stylesheet" href="mystic.css">
</head>
<body>

  <div class="bg-mystic-overlay"></div>

  <div id="sidebar">
    <div class="sidebar-header">
        <span class="symbol">✧</span>
        <h2>ALEXANDRIA</h2>
        <span class="symbol">✧</span>
    </div>
    
    <div class="search-group">
        <input type="text" id="searchBox" placeholder="Buscar sabiduría..." onkeyup="if(event.key==='Enter') search()">
        <button onclick="search()">Buscar</button>
    </div>

    <div id="resultsList">
        </div>
  </div>

  <div id="viewer-container">
    <div id="previewContent">
        <div class="welcome-msg">
            <p>Selecciona un texto del archivo para comenzar la lectura...</p>
        </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
